version: "3.9"

services:
  postgres:
    image: postgres:17

    container_name: notes-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${DB_USER} 
      POSTGRES_PASSWORD: ${DB_PASSWORD} 
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./SQL/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: .

    container_name: notes-backend

    restart: unless-stopped

    depends_on:
      - postgres

    ports:
      - "3000:3000"

    environment:
      PORT: ${PORT}
      DB_USER: ${DB_USER} 
      DB_PASSWORD: ${DB_PASSWORD} 
      DB_NAME: ${DB_NAME} 
      DB_HOST: ${DB_HOST} 
      DB_PORT: ${DB_PORT}

volumes:
  postgres_data: